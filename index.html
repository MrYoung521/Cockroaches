<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蟑螂实验组（cockroach experimental group）</title>
  <style>
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      position: relative;
      background: white;
      padding: 50px 40px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      width: 90%;
      max-width: 520px;
    }

    .lang-switch {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .lang-switch:hover {
      background: #555;
    }

    h1 {
      margin-bottom: 30px;
      color: #333;
      font-size: 28px;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 15px;
      font-size: 18px;
      color: white;
      background: #4a90e2;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .btn:hover {
      background: #357abd;
      transform: translateY(-2px);
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #000;
      border-radius: 16px;
      padding: 20px;
      position: relative;
      width: 90%;
      max-width: 680px;
    }

    .modal-box iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: 8px;
      display: block;
    }

    .modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      background: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      line-height: 32px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .modal-close:hover {
      background: #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="lang-switch" onclick="toggleLanguage()">English</button>

    <h1 id="pageTitle">蟑螂实验组</h1>

    <!-- Alcohol -->
    <button class="btn" id="btn1" onclick="openModal('alcohol')">酒精</button>

    <!-- Oil -->
    <button class="btn" id="btn2" onclick="openModal('oil')">油</button>

    <!-- Water -->
    <button class="btn" id="btn3" onclick="openModal('water')">水</button>

    <!-- Salt -->
    <button class="btn" id="btn4" onclick="openModal('salt')">盐</button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="videoModal" onclick="handleOverlayClick(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <iframe id="modalIframe" src="" allowfullscreen scrolling="no"></iframe>
    </div>
  </div>

  <script>
    let currentLang = "zh";

    const videoSources = {
      water:   "https://ycefhk-my.sharepoint.com/personal/joshua_young_ywies_com/_layouts/15/embed.aspx?UniqueId=28f681c0-7671-4ae5-87b1-851c0f38bdeb&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create",
      alcohol: "https://ycefhk-my.sharepoint.com/personal/joshua_young_ywies_com/_layouts/15/embed.aspx?UniqueId=bace36f2-1b53-4823-8630-19472aec6601&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create",
      oil:     "https://ycefhk-my.sharepoint.com/personal/joshua_young_ywies_com/_layouts/15/embed.aspx?UniqueId=4c949982-3216-4798-84c9-4c54818cb0f2&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create",
      salt:    "https://ycefhk-my.sharepoint.com/personal/joshua_young_ywies_com/_layouts/15/embed.aspx?UniqueId=78f4a0d4-0a98-4a8a-a50f-d60f92989d65&embed=%7B%22ust%22%3Atrue%2C%22hv%22%3A%22CopyEmbedCode%22%7D&referrer=StreamWebApp&referrerScenario=EmbedDialog.Create"
    };

    function openModal(videoKey) {
      const modal = document.getElementById("videoModal");
      const iframe = document.getElementById("modalIframe");
      iframe.src = videoSources[videoKey];
      modal.classList.add("active");
    }

    function closeModal() {
      const modal = document.getElementById("videoModal");
      const iframe = document.getElementById("modalIframe");
      modal.classList.remove("active");
      // Clear src to stop video playing in background
      iframe.src = "";
    }

    function handleOverlayClick(event) {
      // Close if clicking the dark overlay background, not the video box
      if (event.target === document.getElementById("videoModal")) {
        closeModal();
      }
    }

    function toggleLanguage() {
      const title = document.getElementById("pageTitle");
      const btn1 = document.getElementById("btn1");
      const btn2 = document.getElementById("btn2");
      const btn3 = document.getElementById("btn3");
      const btn4 = document.getElementById("btn4");
      const switchBtn = document.querySelector(".lang-switch");

      if (currentLang === "zh") {
        document.documentElement.lang = "en";
        document.title = "Cockroach Experimental Group";
        title.textContent = "Cockroach Experimental Group";
        btn1.textContent = "Alcohol";
        btn2.textContent = "Oil";
        btn3.textContent = "Water";
        btn4.textContent = "Salt";
        switchBtn.textContent = "中文";
        currentLang = "en";
      } else {
        document.documentElement.lang = "zh-CN";
        document.title = "蟑螂实验组";
        title.textContent = "蟑螂实验组";
        btn1.textContent = "酒精";
        btn2.textContent = "油";
        btn3.textContent = "水";
        btn4.textContent = "盐";
        switchBtn.textContent = "English";
        currentLang = "zh";
      }
    }
  </script>
</body>
</html>
